<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email confirmed</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7f8;
      color: #1f2937;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      max-width: 540px;
      background: white;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      text-align: center;
    }
    h1 {
      margin-top: 0;
      color: #15803d;
      font-size: 28px;
    }
    p {
      font-size: 16px;
      line-height: 1.55;
      margin: 12px 0;
    }
  </style>
</head>
  <script>
  const deepLink = "com.sdkdev.danishdolphins://login-callback";

  function isMobile() {
    return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
  }

  if (isMobile()) {
    // Try to open the app automatically
    window.location.href = deepLink;

    // Fallback: if app didn't open, stay on page
    setTimeout(() => {
      document.getElementById("openAppBtn").style.display = "inline-block";
    }, 1500);
  } else {
    // On desktop: just show button (no redirect)
    document.getElementById("openAppBtn").style.display = "inline-block";
  }
</script>
<body>
  <div class="card">
    <h1>Email confirmed successfully</h1>
    <p>Your email address has been verified.</p>
    <p>You can now log in to the <strong>Danish Dolphins</strong> app.</p>
    <p>If the app did not open automatically, open it manually and sign in.</p>
    <a id="openAppBtn" href="com.sdkdev.danishdolphins://login-callback" style="display:none;
  margin-top:20px;
  padding:12px 20px;
  border-radius:10px;
  background:#0f766e;
  color:white;
  text-decoration:none;
  font-weight:600;">
  Open Danish Dolphins app</a>
  </div>
</body>
</html>
